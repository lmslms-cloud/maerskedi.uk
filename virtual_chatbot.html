<!-- Built for L&S LT offsite workshop - A3 Prototype Demo - 05-FEB-2026 -->
<!-- Integration Change Portal — Change Request -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Virtual Assistant Chatbot — Live Demo</title>
  <style>
    :root{
      --bg:#0b1220; --panel:#101828; --bubble:#1b2540; --user:#2a7bf6; --text:#e6eefc; --muted:#9fb0d3; --ring:rgba(42,123,246,.35);
      --border: rgba(255,255,255,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,'Noto Sans';background:radial-gradient(1000px 600px at 90% -10%,rgba(42,123,246,.15),transparent 60%),radial-gradient(900px 500px at -10% 0,rgba(111,66,193,.12),transparent 60%),var(--bg);color:var(--text)}
    header{padding:28px 16px 10px;text-align:center}
    h1{margin:0;font-size:1.7rem}
    p.sub{margin:6px 0 0;color:var(--muted)}
    .container{max-width:920px;margin:16px auto 40px;padding:0 16px}
    .chat-card{background:linear-gradient(180deg,rgba(27,37,64,.9),rgba(16,24,40,.96));border:1px solid var(--border);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.35);overflow:hidden}
    .chat-header{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
    .left{display:flex;gap:12px;align-items:center}
    .dot{width:10px;height:10px;border-radius:50%;background:#34d399;box-shadow:0 0 0 6px rgba(52,211,153,.15)}
    .chat-header h2{margin:0;font-size:1rem;color:var(--muted);letter-spacing:.2px}
    .clear{appearance:none;border:1px solid var(--border);background:transparent;color:var(--text);padding:8px 12px;border-radius:10px;cursor:pointer}
    .clear:hover{background:rgba(255,255,255,.04)}

    .chat{padding:18px; display:flex; flex-direction:column; gap:14px; max-height:58vh; overflow:auto; scroll-behavior:smooth;}
    .row{display:flex;gap:10px;align-items:flex-start}
    .row.user{flex-direction:row-reverse}
    .avatar{flex:0 0 36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2a7bf6,#6f42c1);display:grid;place-items:center;color:white;font-weight:700}
    .avatar.user{background:linear-gradient(135deg,#34d399,#2a7bf6)}
    .bubble{background:var(--bubble);padding:12px 14px;border-radius:14px;max-width:72ch;border:1px solid var(--border);box-shadow:0 10px 20px rgba(0,0,0,.25)}
    .row.user .bubble{background:linear-gradient(180deg,rgba(42,123,246,.9),rgba(42,123,246,.85));}
    .name{font-size:.8rem;color:var(--muted);margin-bottom:4px}
    .typing{display:inline-flex;gap:4px;align-items:center}
    .typing span{width:6px;height:6px;border-radius:50%;background:#d0dcf5;opacity:.6;animation:bounce 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}

    .quick{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 12px}
    .chip{appearance:none;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);padding:8px 12px;border-radius:999px;cursor:pointer;font-size:.9rem}
    .chip:hover{background:rgba(255,255,255,.06)}

    .composer{display:flex;gap:10px;padding:12px;border-top:1px solid var(--border);background:rgba(255,255,255,.02)}
    .input{flex:1;background:#0f172a;border:1px solid rgba(255,255,255,.1);color:var(--text);border-radius:12px;padding:12px 12px;outline:none}
    .input:focus{border-color:#2a7bf6;box-shadow:0 0 0 4px var(--ring)}
    button.send{appearance:none;border:1px solid var(--border);background:#2a7bf6;color:white;padding:10px 14px;border-radius:12px;font-weight:600;cursor:pointer;box-shadow:0 8px 20px rgba(42,123,246,.28)}
    button.send:hover{filter:brightness(1.05)}
    button.send:active{transform:translateY(1px)}

    pre.summary{white-space:pre-wrap;background:#0f172a;color:#d6e2ff;border:1px dashed var(--border);padding:12px;border-radius:12px}
  </style>
</head>
<body>
  <header>
    <h1>Virtual Assistant - Change Request</h1>
  </header>

  <div class="container">
    <div class="chat-card" role="application" aria-label="Chatbot">
      <div class="chat-header">
        <div class="left">
          <span class="dot" aria-hidden="true"></span>
          <h2>Assistant is online</h2>
        </div>
        <button class="clear" id="clear">Clear chat</button>
      </div>

      <div class="chat" id="chat" aria-live="polite"></div>
      <div class="quick" id="quick"></div>

      <div class="composer" role="group" aria-label="Message composer">
        <input class="input" id="message" type="text" placeholder="Type a message" aria-label="Type a message" />
        <button type="button" class="send" id="send">Send</button>
      </div>
    </div>
  </div>

  <script>
    const chatEl = document.getElementById('chat');
    const quickEl = document.getElementById('quick');
    const inputEl = document.getElementById('message');
    const sendBtn = document.getElementById('send');
    const clearBtn = document.getElementById('clear');

    const qp = new URLSearchParams(location.search);
    const ctx = {
      requestType: qp.get('requestType') || '',
      customerName: qp.get('customerName') || '',
      businessLine: qp.get('businessLine') || '',
      businessFunction: qp.get('businessFunction') || '',
      region: qp.get('region') || '',
      partnerContact: qp.get('partnerContact') || '',
      goLiveDate: qp.get('goLiveDate') || '',

      change: 'Change customer address field length from 10 to 20',
      party: '', // consignee | shipper | both
      system: '',
      priority: '',
    };

    const state = { step: 'init' };

    function saveTranscript(){
      const items = [...chatEl.querySelectorAll('.row')].map(r=>({
        role: r.classList.contains('user') ? 'user' : 'assistant',
        text: r.querySelector('.bubble > div:last-child')?.textContent || ''
      }));
      localStorage.setItem('virtual_chat_transcript', JSON.stringify(items));
    }

    function restoreTranscript(){
      const raw = localStorage.getItem('virtual_chat_transcript');
      if(!raw) return false;
      try {
        const items = JSON.parse(raw);
        chatEl.innerHTML = '';
        for(const m of items){
          addRow(m.role, m.text);
        }
        chatEl.scrollTop = chatEl.scrollHeight;
        return true;
      } catch(e){ return false; }
    }

    function addRow(role, text){
      const row = document.createElement('div');
      row.className = 'row' + (role==='user' ? ' user' : '');
      const avatar = document.createElement('div');
      avatar.className = 'avatar' + (role==='user' ? ' user' : '');
      avatar.textContent = role==='user' ? 'U' : 'A';
      avatar.setAttribute('aria-hidden','true');
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = role;
      const body = document.createElement('div');
      body.textContent = text;
      bubble.appendChild(name); bubble.appendChild(body);
      row.appendChild(avatar); row.appendChild(bubble);
      chatEl.appendChild(row);
      chatEl.scrollTop = chatEl.scrollHeight;
      saveTranscript();
    }

    function setQuickReplies(labels){
      quickEl.innerHTML = '';
      if(!labels || !labels.length) return;
      for(const lab of labels){
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.textContent = lab;
        btn.addEventListener('click', ()=> handleUser(lab));
        quickEl.appendChild(btn);
      }
    }

    function typing(on){
      let t = chatEl.querySelector('.typing-row');
      if(on){
        if(t) return;
        const row = document.createElement('div');
        row.className = 'row typing-row';
        row.innerHTML = `
          <div class="avatar" aria-hidden="true">A</div>
          <div class="bubble"><div class="name">assistant</div><div class="typing"><span></span><span></span><span></span></div></div>`;
        chatEl.appendChild(row);
        chatEl.scrollTop = chatEl.scrollHeight;
      } else if(t){ t.remove(); }
    }

    function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

    async function reply(text, quick=[]) {
      typing(true);
      await sleep(Math.min(1200, 350 + text.length * 20));
      typing(false);
      addRow('assistant', text);
      setQuickReplies(quick);
    }

    function parseParty(text){
      const t = text.toLowerCase();
      if(/consignee/.test(t)) return 'consignee';
      if(/shipper/.test(t)) return 'shipper';
      if(/both|all/i.test(t)) return 'both';
      return '';
    }

    function parsePriority(text){
      const t = text.toLowerCase();
      if(/high|p1/.test(t)) return 'High';
      if(/medium|normal|p2/.test(t)) return 'Medium';
      if(/low|p3/.test(t)) return 'Low';
      return '';
    }

    function parseDate(text){
      // Accept YYYY-MM-DD or DD/MM/YYYY or MM/DD/YYYY
      const iso = text.match(/\b(20\d{2})-(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])\b/);
      if(iso) return iso[0];
      const slash = text.match(/\b(0?[1-9]|[12]\d|3[01])[\/](0?[1-9]|1[0-2])[\/](20\d{2})\b/);
      if(slash){
        const [d,m,y] = slash[0].split('/');
        // Normalize to YYYY-MM-DD assuming DD/MM/YYYY
        const dd = d.padStart(2,'0');
        const mm = m.padStart(2,'0');
        return `${y}-${mm}-${dd}`;
      }
      return '';
    }

    async function handleUser(text){
      addRow('user', text);
      inputEl.value = '';
      await router(text);
    }

    async function router(text){
      const step = state.step;
      // global intents
      if(/help|what can you do/i.test(text)){
        return reply('I can collect details for your integration change request: impacted party, system, priority, region, and go-live date, then create a demo ticket.');
      }

      if(step === 'init'){
        // Should not occur as init shows seeded conversation
        state.step = 'await_party';
        return;
      }
      if(step === 'await_party'){
        const party = parseParty(text);
        if(!party){
          return reply('Please specify whether this is for the consignee, shipper, or both.', ['Consignee','Shipper','Both']);
        }
        ctx.party = party;
        state.step = 'await_system';
        const base = `Got it. We will change the customer address field length from 10 to 20 for the ${party}. Which system is impacted?`;
        return reply(base, ['GCSS','SAP TM','CargoWise','Other']);
      }
      if(step === 'await_system'){
        ctx.system = text.trim();
        state.step = 'await_priority';
        return reply('What is the priority of this change?', ['High','Medium','Low']);
      }
      if(step === 'await_priority'){
        const p = parsePriority(text) || text.trim();
        ctx.priority = p.charAt(0).toUpperCase() + p.slice(1).toLowerCase();
        // If we already have go-live from query params, confirm
        if(ctx.goLiveDate){
          state.step = 'confirm_golive';
          return reply(`I see a desired go-live date of ${ctx.goLiveDate}. Do you want to keep this date?`, ['Yes, keep','Change date']);
        }
        state.step = 'await_golive';
        return reply('What is the desired go-live date? (e.g., 2026-03-15 or 15/03/2026)');
      }
      if(step === 'confirm_golive'){
        if(/yes|keep/i.test(text)){
          // proceed
        } else {
          state.step = 'await_golive';
          return reply('Okay, please provide the new desired go-live date (YYYY-MM-DD or DD/MM/YYYY).');
        }
        // fallthrough to region
        if(ctx.region){
          state.step = 'confirm_region';
          return reply(`Region is set to ${ctx.region}. Keep this?`, ['Yes, keep','Change region']);
        }
        state.step = 'await_region';
        return reply('Which region does this request apply to?', ['AMER','EMEA','APAC','Global']);
      }
      if(step === 'await_golive'){
        const d = parseDate(text);
        if(!d){
          return reply('I could not read the date. Please use YYYY-MM-DD or DD/MM/YYYY.');
        }
        ctx.goLiveDate = d;
        if(ctx.region){
          state.step = 'confirm_region';
          return reply(`Region is set to ${ctx.region}. Keep this?`, ['Yes, keep','Change region']);
        }
        state.step = 'await_region';
        return reply('Which region does this request apply to?', ['AMER','EMEA','APAC','Global']);
      }
      if(step === 'confirm_region'){
        if(/yes|keep/i.test(text)){
          // keep
        } else {
          state.step = 'await_region';
          return reply('Okay, choose the correct region.', ['AMER','EMEA','APAC','Global']);
        }
        state.step = 'summary';
        return doSummary();
      }
      if(step === 'await_region'){
        ctx.region = text.trim();
        state.step = 'summary';
        return doSummary();
      }
      if(step === 'summary'){
        if(/create ticket/i.test(text)){
          const id = 'CRS-' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '-' + Math.random().toString(36).slice(2,6).toUpperCase();
          reply(`✅ Ticket created: ${id}. We have logged your change request. You can clear the chat to start over.`);
          return;
        }
        return reply('Type "Create ticket" to finish, or change any detail by typing it again (e.g., "Region APAC").');
      }

      // Fallback quick edit commands
      if(/^region\s+/i.test(text)){
        ctx.region = text.split(/\s+/)[1] || ctx.region;
        return doSummary();
      }
      if(/^priority\s+/i.test(text)){
        ctx.priority = text.split(/\s+/)[1] || ctx.priority;
        return doSummary();
      }
      if(/^date\s+/i.test(text)){
        const d = parseDate(text);
        if(d){ ctx.goLiveDate = d; return doSummary(); }
      }

      return reply("I'm not sure I understood. You can type 'help' to see what I can do.");
    }

    async function doSummary(){
      const lines = [];
      if(ctx.customerName) lines.push(`Customer: ${ctx.customerName}`);
      if(ctx.requestType) lines.push(`Request Type: ${ctx.requestType}`);
      lines.push(`Change: ${ctx.change}`);
      if(ctx.party) lines.push(`Party: ${ctx.party}`);
      if(ctx.system) lines.push(`System: ${ctx.system}`);
      if(ctx.priority) lines.push(`Priority: ${ctx.priority}`);
      if(ctx.region) lines.push(`Region: ${ctx.region}`);
      if(ctx.goLiveDate) lines.push(`Desired Go-Live: ${ctx.goLiveDate}`);
      if(ctx.partnerContact) lines.push(`Partner Contact: ${ctx.partnerContact}`);
      const summary = 'Here is a summary of your request:\n\n' + lines.join('\n') + '\n\nType "Create ticket" to complete.';
      return reply(summary, ['Create ticket']);
    }

    function seedConversation(){
      chatEl.innerHTML = '';
      addRow('assistant','Hello! How can I assist you today?');
      addRow('user','I want to update the customer address in the Booking Interface');
      addRow('assistant','Can you describe the change needed to the customer address?');
      addRow('user','I want to increase the customer address field length from 10 to 20');
      addRow('assistant','Is this the customer address for the consignee or the shipper?');
      state.step = 'await_party';
      setQuickReplies(['Consignee','Shipper','Both']);
      saveTranscript();
    }

    // Wire UI
    sendBtn.addEventListener('click', ()=>{ if(inputEl.value.trim()) handleUser(inputEl.value); });
    inputEl.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); sendBtn.click(); }});
    clearBtn.addEventListener('click', ()=>{ localStorage.removeItem('virtual_chat_transcript'); seedConversation(); inputEl.focus(); });

    // Boot
    if(!restoreTranscript()){
      seedConversation();
    }

    // If query params include values and chat has only the seeded conversation, we can show a small helper tip
    if([...qp.keys()].length){
      reply('I have preloaded details from the previous form. We will use them when creating the summary.', []);
    }
  </script>
</body>
</html>
